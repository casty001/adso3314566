    <style>
        section {
            background-color: #333;
            padding: 2rem;
            border-radius: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        table {
            border-collapse: collapse;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        td {
            border: 1px solid white;
            width: 50px;
            height: 50px;
        }

        .bg-black {
            background-color: #000;
        }

        .bg-gray {
            background-color: #444;
        }

        h3 {
            color: #ed6815;
            margin-bottom: 1rem;
        }
    </style>
</head>

    <main>
        <header>
            <h1>10-challenge-tables</h1>
            <h2>Advanced Rowspan and Colspan</h2>
        </header>

        <section>
            <div>
                <h3>Challenge: Emoji Diamond Layout</h3>
                <table>
                <tr>
                    <td colspan="5"></td>
                    <td bgcolor="black">😎</td>
                    <td colspan="3"></td>
                </tr>
                <tr>
                    <td colspan="4"></td>
                    <td bgcolor="black">😎</td>
                    <td rowspan="2" bgcolor="black">😎</td>
                    <td bgcolor="black">😎</td>
                    <td colspan="2"></td>
                </tr>
                <tr>
                    <td colspan="3"></td>
                    <td bgcolor="black">😎</td>
                    <td></td>
                    <td bgcolor="black">😎</td>
                    <td colspan="2"></td>
                </tr>
                <tr>
                    <td colspan="2"></td>
                    <td bgcolor="black">😎</td>
                    <td bgcolor="black" colspan="3">😎</td>
                    <td bgcolor="black">😎</td>
                    <td colspan="2"></td>
                </tr>
                <tr>
                    <td></td>
                    <td bgcolor="black">😎</td>
                    <td bgcolor="black" colspan="5">😎</td>
                    <td bgcolor="black">😎</td>
                    <td></td>
                </tr>
                <tr>
                    <td colspan="2"></td>
                    <td bgcolor="black">😎</td>
                    <td bgcolor="black" colspan="3">😎</td>
                    <td bgcolor="black">😎</td>
                    <td></td>
                    <td></td>
                </tr>
                <tr>
                    <td colspan="3"></td>
                    <td bgcolor="black">😎</td>
                    <td></td>
                    <td bgcolor="black">😎</td>
                    <td colspan="3"></td>
                </tr>
                <tr>
                    <td colspan="4"></td>
                    <td bgcolor="black">😎</td>
                    <td bgcolor="black">😎</td>
                    <td bgcolor="black">😎</td>
                    <td colspan="2"></td>
                </tr>
                <tr>
                    <td colspan="5"></td>
                    <td bgcolor="black">😎</td>
                    <td colspan="3"></td>
                </tr>
            </table>
            </div>
        </section>
    </main>
