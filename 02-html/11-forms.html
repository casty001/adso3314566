<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11-forms</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <link rel="stylesheet" href="../src/css/custom.css">
    <style>
        html {
            scroll-behavior: smooth;
        }

        section {
            background-color: #0009;
            border-radius: 0.5rem;
            min-width: 380px;
            padding: 1.5rem;
            margin: 0 auto;
            color: white;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        input {
            padding: 0.5rem;
            border-radius: 0.3rem;
            border: none;
            font-family: inherit;
        }

        input[type="submit"] {
            background-color: #ed6815;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        input[type="submit"]:hover {
            transform: scale(1.05);
        }

        h3 {
            border-bottom: 2px dotted #fff;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <a href="../02-html/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm48-88a8,8,0,0,1-8,8H107.31l18.35,18.34a8,8,0,0,1-11.32,11.32l-32-32a8,8,0,0,1,0-11.32l32-32a8,8,0,0,1,11.32,11.32L107.31,120H168A8,8,0,0,1,176,128Z">
            </path>
        </svg>
        <path
            d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z">
        </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>11-forms</h1>
            <h2>Interactive inputs.</h2>
        </header>

        <section>
            <form action="#" method="post" enctype="multipart/form-data">
                
                <fieldset>
                    <legend>Account Details</legend>

                    <div class="field">
                        <label for="username">Username:</label>
                        <input type="text" id="username" name="username" placeholder="Example: bcastillo" required>
                    </div>

                    <div class="field">
                        <label for="pass">Password:</label>
                        <input type="password" id="pass" name="pass" placeholder="At least 8 chars" required>
                    </div>

                    <div class="field">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" name="email" placeholder="bcastillo@sena.edu.co" required>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Preferences</legend>

                    <div class="field">
                        <label for="role">Your Role (SELECT/OPTION):</label>
                        <select name="role" id="role">
                            <option value="" disabled selected>Select one...</option>
                            <option value="student">Student</option>
                            <option value="instructor">Instructor</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Preferred Learning Method (RADIO):</label>
                        <div class="field-row">
                            <input type="radio" id="method1" name="learning" value="online" checked>
                            <label for="method1">Online (Virtual)</label>
                        </div>
                        <div class="field-row">
                            <input type="radio" id="method2" name="learning" value="presential">
                            <label for="method2">Presential (On-site)</label>
                        </div>
                    </div>

                    <div class="field">
                        <label>Tech Interests (CHECKBOX):</label>
                        <div class="field-row">
                            <input type="checkbox" id="int1" name="interest_html" value="yes" checked>
                            <label for="int1">HTML5 / CSS3</label>
                        </div>
                        <div class="field-row">
                            <input type="checkbox" id="int2" name="interest_js" value="yes">
                            <label for="int2">JavaScript / React</label>
                        </div>
                        <div class="field-row">
                            <input type="checkbox" id="int3" name="interest_design" value="yes">
                            <label for="int3">UI/UX Design</label>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Advanced Profile</legend>

                    <div class="field">
                        <label for="birthdate">Birthdate (DATE):</label>
                        <input type="date" id="birthdate" name="birthdate" required>
                    </div>

                    <div class="field">
                        <label for="fav_color">Profile Color (COLOR):</label>
                        <input type="color" id="fav_color" name="fav_color" value="#ed6815">
                    </div>

                    <div class="field">
                        <label for="skill_level">HTML Skill Level (RANGE 0-100):</label>
                        <input type="range" id="skill_level" name="skill_level" min="0" max="100" value="50" step="10">
                    </div>

                    <div class="field">
                        <label for="avatar">Upload Profile Image (FILE/IMAGE):</label>
                        <input type="file" id="avatar" name="avatar" accept="image/png, image/jpeg, image/webp" required>
                        <small style="color:bisque;">Accepted formats: PNG, JPG, WEBP</small>
                    </div>

                    <div class="field">
                        <label for="bio">Short Biography (TEXTAREA):</label>
                        <textarea id="bio" name="bio" rows="5" placeholder="Tell us about yourself..."></textarea>
                    </div>
                </fieldset>

                <input type="submit" value="Complete Registration">
            </form>
        </section>
    </main>
</body>

</html>
