<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-graphics</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <link rel="stylesheet" href="../src/css/custom.css">
    <style>
        section {
            background-color: #0009;
            padding: 2rem;
            border-radius: 0.5rem;
            margin: 0 auto;
            max-width: 500px;
            color: white;
            text-align: center;
        }

        .graphic-container {
            background-color: white;
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 0.3rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilos para el Canvas */
        canvas {
            border: 2px solid #ed6815;
            background-color: #f0f0f0;
        }

        h3 {
            color: #ed6815;
            border-bottom: 1px solid #555;
            padding-bottom: 0.5rem;
        }
    </style>
</head>

<body>
    <a href="../02-html/index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256">
            <path
                d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm48-88a8,8,0,0,1-8,8H107.31l18.35,18.34a8,8,0,0,1-11.32,11.32l-32-32a8,8,0,0,1,0-11.32l32-32a8,8,0,0,1,11.32,11.32L107.31,120H168A8,8,0,0,1,176,128Z">
            </path>
        </svg>
        <path
            d="M240,208H224V136l2.34,2.34A8,8,0,0,0,237.66,127L139.31,28.68a16,16,0,0,0-22.62,0L18.34,127a8,8,0,0,0,11.32,11.31L32,136v72H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16ZM48,120l80-80,80,80v88H160V152a8,8,0,0,0-8-8H104a8,8,0,0,0-8,8v56H48Zm96,88H112V160h32Z">
        </path>
        </svg>
    </a>

    <main>
        <header>
            <h1>12-graphics</h1>
            <h2>Inline graphics with tags.</h2>
        </header>

        <section>
            <h3>Canvas Element</h3>
            <p><small>Dibujado mediante scripting (JavaScript)</small></p>
            <div class="graphic-container">
                <canvas id="myCanvas" width="200" height="100"></canvas>
            </div>

            <h3>SVG Element</h3>
            <p><small>Gráficos vectoriales escalables</small></p>
            <div class="graphic-container">
                <svg width="200" height="200" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M10,80 L90,80 L90,40 L10,20 Z" fill="#ffcc00" stroke="#333" stroke-width="2"/>
        
        <path d="M10,20 L90,40 L70,10 L20,10 Z" fill="#ffe066" stroke="#333" stroke-width="2"/>

        <circle cx="30" cy="45" r="5" fill="#e6b800" />
        <circle cx="60" cy="60" r="7" fill="#e6b800" />
        <circle cx="45" cy="25" r="4" fill="#e6b800" />
        <circle cx="75" cy="45" r="3" fill="#e6b800" />
        <circle cx="25" cy="65" r="4" fill="#e6b800" />
    </svg>
            </div>
        </section>
    </main>

    <script>
        const canvas = document.getElementById('myCanvas');
        const ctx = canvas.getContext('2d');

        // Dibujar un rectángulo
        ctx.fillStyle = '#ed6815';
        ctx.fillRect(20, 20, 160, 60);

        // Dibujar texto
        ctx.fillStyle = 'white';
        ctx.font = '20px Arial';
        ctx.fillText('Canvas Box', 45, 55);
    </script>
</body>

</html>
